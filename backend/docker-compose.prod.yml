version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: homestay-api:prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health/live"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-me}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-homestay}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "${MONGO_ROOT_USERNAME:-root}",
          "--password",
          "${MONGO_ROOT_PASSWORD:-change-me}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
